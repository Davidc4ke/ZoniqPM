<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoniq - Unified Topbar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #FF6B35;
            --orange-light: #FFF7F3;
            --dark: #2D1810;
            --off-white: #FAFAF9;
            --warm-gray: #E8E4E0;
            --medium-gray: #9A948D;
        }
        
        * { font-family: 'Manrope', sans-serif; }
        body { background: #E8E4E0; color: var(--dark); }
        
        .topbar {
            background: white;
            border-bottom: 1px solid var(--warm-gray);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        
        .logo-icon {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.875rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--dark);
            background: transparent;
            border: none;
            cursor: pointer;
            transition: background 0.2s cubic-bezier(0.25, 1, 0.5, 1), color 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .nav-item:hover {
            background: var(--warm-gray);
        }
        
        .nav-item.active {
            background: var(--orange-light);
            color: var(--orange);
        }
        
        .nav-item:focus-visible {
            outline: 2px solid var(--orange);
            outline-offset: 2px;
        }
        
        .btn-secondary {
            background: white;
            color: var(--dark);
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.375rem;
            border: 1px solid var(--warm-gray);
            cursor: pointer;
            transition: border-color 0.2s cubic-bezier(0.25, 1, 0.5, 1), color 0.2s cubic-bezier(0.25, 1, 0.5, 1), background 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .btn-secondary:hover {
            border-color: var(--orange);
            color: var(--orange);
            background: var(--orange-light);
        }
        
        .btn-secondary:focus-visible {
            outline: 2px solid var(--orange);
            outline-offset: 2px;
        }
        
        .btn-ghost {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--dark);
            transition: background 0.2s cubic-bezier(0.25, 1, 0.5, 1), color 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .btn-ghost:hover {
            background: var(--warm-gray);
        }
        
        .btn-ghost:focus-visible {
            outline: 2px solid var(--orange);
            outline-offset: 2px;
        }
        
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            transition: box-shadow 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            object-fit: cover;
            border: 2px solid var(--warm-gray);
        }
        
        .avatar:hover {
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.2);
            border-color: var(--orange);
        }
        
        .icon {
            width: 1rem;
            height: 1rem;
            flex-shrink: 0;
        }
        
        .icon-sm {
            width: 0.875rem;
            height: 0.875rem;
        }
        
        .dropdown {
            position: relative;
        }
        
        .dropdown-menu {
            position: absolute;
            top: calc(100% + 4px);
            right: 0;
            min-width: 180px;
            background: white;
            border: 1px solid var(--warm-gray);
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(45, 24, 16, 0.12);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-4px);
            transition: opacity 0.15s ease, transform 0.15s ease, visibility 0.15s ease;
            z-index: 100;
        }
        
        .dropdown.open .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 0.625rem;
            padding: 0.625rem 0.875rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--dark);
            cursor: pointer;
            transition: background 0.15s ease;
        }
        
        .dropdown-item:first-child {
            border-radius: 10px 10px 0 0;
        }
        
        .dropdown-item:last-child {
            border-radius: 0 0 10px 10px;
        }
        
        .dropdown-item:hover {
            background: var(--orange-light);
            color: var(--orange);
        }
        
        .dropdown-divider {
            height: 1px;
            background: var(--warm-gray);
            margin: 0.375rem 0;
        }
        
        
        .content-placeholder {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .demo-card {
            background: white;
            border-radius: 12px;
            border: 1px solid var(--warm-gray);
            padding: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- TOPBAR -->
    <header class="topbar">
        <div class="flex items-center justify-between px-6 py-3 max-w-[1280px] mx-auto">
            <!-- Left: Logo + Navigation -->
            <div class="flex items-center gap-6">
                <!-- Logo -->
                <div class="font-bold text-lg flex items-center gap-2.5 flex-shrink-0">
                    <svg class="logo-icon" viewBox="0 0 707.49 707.49" xmlns="http://www.w3.org/2000/svg">
                        <rect fill="#FF6B35" width="707.49" height="707.49" rx="80"/>
                        <path fill="#2D1810" d="M271.9,459.21c0,5.79-4.7,10.49-10.49,10.49h-33.59c-5.79,0-10.49-4.7-10.49-10.49v-33.59c0-5.79,4.7-10.49,10.49-10.49h33.6c5.78,0,10.47-4.68,10.48-10.46,0,0,0-.02,0-.03v-19.95c0-5.79,4.7-10.49,10.49-10.49h19.95c5.79,0,10.49-4.7,10.49-10.49v-19.95c0-5.79,4.7-10.49,10.49-10.49h60.87c5.79,0,10.49-4.7,10.49-10.49v-19.95c0-5.79-4.7-10.49-10.49-10.49h-142.72c-5.79,0-10.49-4.7-10.49-10.49v-33.59c0-5.79,4.7-10.49,10.49-10.49h142.72c5.79,0,10.49,4.7,10.49,10.49v33.59c0,5.79,4.7,10.49,10.49,10.49h19.95c5.79,0,10.49,4.7,10.49,10.49v19.95c0,5.79-4.7,10.49-10.49,10.49h-19.95c-5.79,0-10.48,4.69-10.48,10.48v19.95c0,5.79-4.7,10.49-10.49,10.49h-60.87c-5.79,0-10.49,4.7-10.49,10.49v19.95c0,5.79,4.7,10.49,10.49,10.49h142.72c5.79,0,10.49,4.7,10.49,10.49v33.59c0,5.79-4.7,10.49-10.49,10.49h-142.72c-5.79,0-10.49-4.7-10.49-10.49v-33.59c0-5.79-4.7-10.49-10.49-10.49h-19.94c-4.34,0-8.07,2.64-9.66,6.41-.02.04-.02.09-.04.13-.5,1.22-.78,2.55-.78,3.95v33.59Z"/>
                        <circle fill="#2D1810" cx="462.88" cy="265.07" r="27.28"/>
                    </svg>
                    <span>ZONIQ</span>
                </div>
                
                <!-- Navigation (role-aware) -->
                <nav class="flex items-center gap-1">
                    <button class="nav-item active">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="7" height="7"/>
                            <rect x="14" y="3" width="7" height="7"/>
                            <rect x="14" y="14" width="7" height="7"/>
                            <rect x="3" y="14" width="7" height="7"/>
                        </svg>
                        Dashboard
                    </button>
                    <button class="nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="4" y="4" width="16" height="16" rx="2"/>
                            <path d="M4 10h16"/>
                            <path d="M10 4v16"/>
                        </svg>
                        Kanban
                    </button>
                    <button class="nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                        </svg>
                        Projects
                    </button>
                    <!-- Role-specific nav items (visible for admins/managers) -->
                    <button class="nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <ellipse cx="12" cy="5" rx="9" ry="3"/>
                            <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
                            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
                        </svg>
                        Masterdata
                    </button>
                    <button class="nav-item">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                        Accounts
                    </button>
                </nav>
            </div>
            
            <!-- Right: Actions + Profile -->
            <div class="flex items-center gap-3">
                <!-- Create Button with Dropdown -->
                <div class="dropdown" id="createDropdown">
                    <button class="btn-secondary" onclick="toggleDropdown('createDropdown')">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                        Create
                        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m6 9 6 6 6-6"/>
                        </svg>
                    </button>
                    <div class="dropdown-menu">
                        <div class="dropdown-item" onclick="closeDropdown('createDropdown')">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M12 8v8M8 12h8"/>
                            </svg>
                            New Ticket
                        </div>
                        <div class="dropdown-item" onclick="closeDropdown('createDropdown')">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                            </svg>
                            New Project
                        </div>
                        <div class="dropdown-item" onclick="closeDropdown('createDropdown')">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
                                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                            </svg>
                            New Story
                        </div>
                        <div class="dropdown-divider"></div>
                        <div class="dropdown-item" onclick="closeDropdown('createDropdown')">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                                <polyline points="14 2 14 8 20 8"/>
                            </svg>
                            New Document
                        </div>
                    </div>
                </div>
                
                <!-- AI Chat Button -->
                <button class="btn-ghost" title="Open AI Chat">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        <path d="M8 10h.01M12 10h.01M16 10h.01"/>
                    </svg>
                </button>
                
                
                <!-- Profile Dropdown -->
                <div class="dropdown" id="profileDropdown">
                    <img src="Profile Picture.png" alt="Profile" class="avatar" onclick="toggleDropdown('profileDropdown')">
                    <div class="dropdown-menu">
                        <div class="px-3 py-2 border-b border-[#E8E4E0]">
                            <div class="font-semibold text-sm">David</div>
                            <div class="text-xs text-[#9A948D]">david@zoniq.dev</div>
                        </div>
                        <div class="dropdown-item" onclick="closeDropdown('profileDropdown')">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            View Profile
                        </div>
                        <div class="dropdown-item" onclick="closeDropdown('profileDropdown')">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v2.16c0 .28-.22.5-.5.5H7.5a2 2 0 0 0-2 2v.66a2 2 0 0 0 1.89 1.89l.66.66a2 2 0 0 0 2.83 0l.66-.66a2 2 0 0 0 1.89-1.89V17.5a2 2 0 0 0-2-2h-1.78a.5.5 0 0 0-.5.5v2.16a2 2 0 0 1-2 2h6.84a2 2 0 0 1-2-2v-2.16a.5.5 0 0 0-.5-.5H17.5a2 2 0 0 0 2-2v-.66a2 2 0 0 0-1.89-1.89l-.66-.66a2 2 0 0 0 0-2.83l.66-.66a2 2 0 0 0 1.89-1.89V6.5a2 2 0 0 0-2-2h-.78a.5.5 0 0 0-.5-.5V4a2 2 0 0 0-2-2z"/>
                            </svg>
                            Settings
                        </div>
                        <div class="dropdown-divider"></div>
                        <div class="dropdown-item text-red-500 hover:text-red-600" onclick="closeDropdown('profileDropdown')">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                                <polyline points="16 17 21 12 16 7"/>
                                <line x1="21" y1="12" x2="9" y2="12"/>
                            </svg>
                            Sign Out
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Demo Content Below Topbar -->
    <div class="content-placeholder">
        <div class="demo-card">
            <h2 class="text-xl font-bold mb-2">Unified Topbar Demo</h2>
            <p class="text-[#9A948D]">This demonstrates the unified topbar design. Try clicking the Create button or Profile avatar to see dropdowns.</p>
        </div>
    </div>
    
    <script>
        function toggleDropdown(id) {
            const dropdown = document.getElementById(id);
            const isOpen = dropdown.classList.contains('open');
            closeAllDropdowns();
            if (!isOpen) {
                dropdown.classList.add('open');
            }
        }
        
        function closeDropdown(id) {
            document.getElementById(id).classList.remove('open');
        }
        
        function closeAllDropdowns() {
            document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
        }
        
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.dropdown')) {
                closeAllDropdowns();
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeAllDropdowns();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                alert('Command palette would open here!');
            }
        });
    </script>
</body>
</html>
