name: dev-story-replan
description: 'Replan story implementation when current plan has issues. Reads replan_reason, adjusts future tasks, and updates plan_history. Triggered by dev-story-task when plan issues detected. Use when user says "replan this story" or session has replan_reason set'

# Critical variables from config
config_source: "{project-root}/_bmad/bmm/config.yaml"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
user_skill_level: "{config_source}:user_skill_level"
document_output_language: "{config_source}:document_output_language"
date: system-generated

# Workflow components
installed_path: "{project-root}/_bmad/bmm/workflows/4-implementation/dev-story-replan"
instructions: "{installed_path}/instructions.xml"

# Workflow inputs
story_key: "" # Derived from session.yaml path or explicit parameter
dev_session_root: ".dev-session"
session_file: "{dev_session_root}/{story_key}/session.yaml"
plan_file: "{dev_session_root}/{story_key}/plan.md"
context_handoff_file: "{dev_session_root}/{story_key}/context-handoff.md"
story_file: "{implementation_artifacts}/{story_key}.md"
implementation_artifacts: "{config_source}:implementation_artifacts"

# Workflow outputs
updated_plan_file: "{dev_session_root}/{story_key}/plan.md"
updated_session_file: "{dev_session_root}/{story_key}/session.yaml"
plan_history_file: "{dev_session_root}/{story_key}/plan-history.md"

# Command line parameters
parameters:
  - name: story-key
    type: string
    required: false
    description: Story key to replan (e.g., "2-0-home-page-dashboard-layout"). If not provided, uses most recent dev session.
