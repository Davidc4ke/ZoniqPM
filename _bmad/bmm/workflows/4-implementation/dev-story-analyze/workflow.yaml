name: dev-story-analyze
description: 'Analyze story and create implementation plan with task breakdown. First step in atomized development workflow. Use when the user says "analyze this story" or "start dev session for [story]"'

# Critical variables from config
config_source: "{project-root}/_bmad/bmm/config.yaml"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
user_skill_level: "{config_source}:user_skill_level"
document_output_language: "{config_source}:document_output_language"
date: system-generated

# Workflow components
installed_path: "{project-root}/_bmad/bmm/workflows/4-implementation/dev-story-analyze"
instructions: "{installed_path}/instructions.xml"

# Workflow inputs
story_file: "" # Explicit story path; auto-discovered from sprint-status.yaml if empty
project_context: "**/project-context.md"
sprint_status: "{implementation_artifacts}/sprint-status.yaml"
implementation_artifacts: "{config_source}:implementation_artifacts"

# Workflow outputs
dev_session_root: ".dev-session"
session_file: "{dev_session_root}/{story_key}/session.yaml"
plan_file: "{dev_session_root}/{story_key}/plan.md"
context_handoff_file: "{dev_session_root}/{story_key}/context-handoff.md"
context_handoff_template: "{installed_path}/templates/context-handoff.md"

# Story key extraction pattern (derived from story filename)
story_key_pattern: "(\d+-\d+)-.*"
